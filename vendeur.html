<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA Business - Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-dark-aura { background-color: #0F172A; }
        .text-aura-gold { color: #FACC15; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #FACC15; border-bottom: 3px solid #FACC15; }
    </style>
</head>
<body class="bg-slate-50 pb-20">

    <header class="bg-dark-aura p-6 text-white shadow-2xl sticky top-0 z-50">
        <h1 class="text-xl font-black text-aura-gold">AURA BUSINESS</h1>
        <p class="text-[10px] uppercase font-bold text-slate-400">Gestion Boutique Live</p>
    </header>

    <nav class="bg-white border-b flex justify-around p-2 sticky top-[80px] z-40">
        <button onclick="showTab('dashboard', this)" class="nav-btn py-3 px-4 text-xs font-black uppercase active">Revenus</button>
        <button onclick="showTab('inventory', this)" class="nav-btn py-3 px-4 text-xs font-black uppercase">Mon Stock</button>
    </nav>

    <main class="p-4 max-w-xl mx-auto">
        <div id="dashboard" class="tab-content active space-y-4">
            <div class="bg-dark-aura p-6 rounded-[2rem] text-white shadow-2xl border-b-4 border-aura-gold">
                <h3 class="text-aura-gold font-black uppercase text-[10px] mb-4">Calculateur Redevance</h3>
                <div id="fee-box" class="space-y-2 text-xs opacity-80 italic text-center">Ajoutez des produits pour calculer</div>
            </div>
        </div>

        <div id="inventory" class="tab-content space-y-6">
            <div class="bg-white p-6 rounded-[2rem] border-2 border-dashed border-slate-200 shadow-xl space-y-4">
                <h3 class="font-black text-xs uppercase text-slate-400">Nouveau Produit</h3>
                <input type="text" id="p-name" placeholder="Nom" class="w-full bg-slate-100 p-4 rounded-2xl text-sm outline-none">
                <div class="flex gap-2">
                    <input type="number" id="p-price" placeholder="Prix (DA)" class="w-full bg-slate-100 p-4 rounded-2xl text-sm outline-none">
                    <select id="p-cat" class="bg-slate-100 p-4 rounded-2xl text-sm outline-none uppercase font-bold">
                        <option value="food">Food</option>
                        <option value="tech">Tech</option>
                        <option value="bijoux">Bijoux</option>
                        <option value="homme">Homme</option>
                    </select>
                </div>
                <input type="text" id="p-img" placeholder="Lien photo (URL)" class="w-full bg-slate-100 p-4 rounded-2xl text-sm outline-none">
                <button onclick="publish()" id="btn-pub" class="w-full bg-dark-aura text-aura-gold py-5 rounded-2xl font-black uppercase text-xs shadow-xl active:scale-95 transition">Publier le produit</button>
            </div>

            <div id="my-list" class="space-y-3"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAfhk8w5rp8ZI-nJ0cr-T7cEC9om_NfZYg",
            authDomain: "aura-marketplace-dz.firebaseapp.com",
            projectId: "aura-marketplace-dz",
            storageBucket: "aura-marketplace-dz.firebasestorage.app",
            messagingSenderId: "182190931936",
            appId: "1:182190931936:web:b0bdd66d819547be8d7585"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.publish = async () => {
            const name = document.getElementById('p-name').value;
            const price = parseFloat(document.getElementById('p-price').value);
            const cat = document.getElementById('p-cat').value;
            const img = document.getElementById('p-img').value;

            if(!name || !price) return alert("Nom et Prix requis !");
            
            await addDoc(collection(db, "products"), { name, price, cat, img, createdAt: Date.now() });
            alert("En ligne !");
            document.getElementById('p-name').value = ""; document.getElementById('p-price').value = "";
        };

        onSnapshot(collection(db, "products"), (snap) => {
            const list = document.getElementById('my-list');
            const feeBox = document.getElementById('fee-box');
            list.innerHTML = '<h3 class="font-black text-xs uppercase text-slate-400 ml-2">Mon Catalogue</h3>';
            let fee = 0;
            snap.forEach(d => {
                const p = d.data();
                fee += (p.price > 200 ? 10 : p.price * 0.01);
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl flex items-center justify-between shadow-sm border border-slate-100">
                        <div class="flex items-center gap-4">
                            <img src="${p.img || 'https://via.placeholder.com/100'}" class="w-12 h-12 rounded-xl object-cover shadow">
                            <div>
                                <p class="text-[10px] font-black uppercase text-slate-800">${p.name}</p>
                                <p class="text-[9px] font-bold text-blue-600 uppercase">${p.price} DA</p>
                            </div>
                        </div>
                        <button onclick="del('${d.id}')" class="text-red-400 p-2"><i class="fa-solid fa-trash-can"></i></button>
                    </div>`;
            });
            feeBox.innerHTML = `<span class="text-aura-gold font-black text-lg">${fee.toFixed(2)} DA</span><br>Redevance Totale AURA`;
        });

        window.del = async (id) => { if(confirm("Supprimer ?")) await deleteDoc(doc(db, "products", id)); };
        window.showTab = (id, btn) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        };
    </script>
</body>
</html>
