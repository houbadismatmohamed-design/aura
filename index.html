<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA Marketplace - Root v8.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-aura-blue { background-color: #0A192F; }
        .text-aura-gold { color: #D4AF37; }
        .border-aura-gold { border-color: #D4AF37; }
        .mini-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .option-btn.active { background-color: #0A192F; color: #D4AF37; border-color: #D4AF37; }
        #sidebar, #cart-panel { transition: transform 0.3s ease-in-out; }
        .is-favorite { color: #ff4d4d !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-aura-blue overflow-x-hidden">

    <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-[70]" onclick="toggleSidebar()"></div>
    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-aura-blue z-[80] transform -translate-x-full shadow-2xl p-6">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-aura-gold text-2xl font-black tracking-widest">AURA</h2>
            <i class="fa-solid fa-xmark text-aura-gold text-xl cursor-pointer" onclick="toggleSidebar()"></i>
        </div>
        <nav class="flex flex-col gap-6 text-white font-bold uppercase text-sm">
            <a href="#" onclick="toggleSidebar(); renderHome()" class="hover:text-aura-gold"><i class="fa-solid fa-house mr-3"></i> Accueil</a>
            <a href="#" onclick="toggleSidebar(); renderFavorites()" class="hover:text-aura-gold"><i class="fa-solid fa-heart mr-3"></i> Mes Favoris</a>
            <div class="h-[1px] bg-white/10 my-2"></div>
            <a href="#" class="hover:text-aura-gold text-[10px] text-gray-400">Devenir Vendeur</a>
        </nav>
    </div>

    <div id="cart-overlay" class="hidden fixed inset-0 bg-black/50 z-[70]" onclick="toggleCart()"></div>
    <div id="cart-panel" class="fixed top-0 right-0 h-full w-80 bg-white z-[80] transform translate-x-full shadow-2xl flex flex-col">
        <div class="bg-aura-blue p-4 text-aura-gold flex justify-between items-center">
            <h2 class="font-bold uppercase tracking-widest">Mon Panier</h2>
            <i class="fa-solid fa-arrow-right text-xl cursor-pointer" onclick="toggleCart()"></i>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-4">
            </div>
        <div class="p-4 border-t bg-gray-50">
            <div class="flex justify-between font-black text-lg mb-4">
                <span>TOTAL :</span>
                <span id="cart-total">0 DA</span>
            </div>
            <button onclick="checkoutWhatsApp()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold uppercase text-xs flex items-center justify-center gap-2">
                <i class="fa-brands fa-whatsapp text-lg"></i> Commander via WhatsApp
            </button>
        </div>
    </div>

    <header class="bg-aura-blue text-aura-gold p-4 sticky top-0 z-50 shadow-2xl">
        <div class="flex justify-between items-center max-w-6xl mx-auto">
            <i class="fa-solid fa-bars-staggered text-xl cursor-pointer" onclick="toggleSidebar()"></i>
            <h1 class="text-3xl font-bold tracking-widest cursor-pointer" onclick="renderHome()">AURA</h1>
            <div class="relative cursor-pointer" onclick="toggleCart()">
                <i class="fa-solid fa-cart-shopping text-xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-aura-gold text-aura-blue text-[9px] font-bold rounded-full w-4 h-4 flex items-center justify-center hidden">0</span>
            </div>
        </div>
        <div class="mt-4 relative max-w-md mx-auto">
            <input type="text" id="search-input" oninput="handleSearch()" placeholder="Rechercher un produit..." class="w-full py-2 px-10 rounded-lg text-gray-800 outline-none">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
        </div>
    </header>

    <main id="app-content" class="max-w-6xl mx-auto p-4">
        <div id="back-nav" class="hidden py-3 text-aura-blue font-black text-xs cursor-pointer mb-2 uppercase border-b border-gray-200" onclick="renderHome()">
            <i class="fa-solid fa-arrow-left-long mr-2"></i> Retour à l'accueil
        </div>
        <div id="category-grid" class="grid grid-cols-4 gap-4 py-4 text-center"></div>
        <div id="hero-banner"></div>
        <div id="product-list" class="grid grid-cols-2 gap-4 mt-6"></div>
    </main>

    <div id="product-modal" class="hidden fixed inset-0 bg-black/80 z-[60] flex items-end sm:items-center justify-center overflow-y-auto">
        <div class="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-3xl overflow-hidden relative mt-10 shadow-2xl">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-aura-blue text-2xl z-10 bg-white/80 rounded-full"><i class="fa-solid fa-circle-xmark"></i></button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        // Data & State
        const mainCategories = [
            { name: "FOOD TO GO", img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?fit=crop&w=150", id: "food" },
            { name: "BIJOUX", img: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?fit=crop&w=150", id: "bijoux" },
            { name: "TECH", img: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?fit=crop&w=150", id: "tech" },
            { name: "AUTO", img: "https://images.unsplash.com/photo-1552519507-da3b142c6e3d?fit=crop&w=150", id: "auto" },
            { name: "HOMME", img: "https://images.unsplash.com/photo-1614252235316-8c857d38b5f4?fit=crop&w=150", id: "homme" },
            { name: "FEMME", img: "https://images.unsplash.com/photo-1539109132314-3477524c859c?fit=crop&w=150", id: "femme" },
            { name: "ENFANTS", img: "https://images.unsplash.com/photo-1515488764276-beab7607c1e6?fit=crop&w=150", id: "enfants" }
        ];

        const foodCategories = [
            { name: "PIZZERIAS", img: "https://images.unsplash.com/photo-1574129624503-602004268502?w=150", id: "pizzeria" },
            { name: "PÊCHERIE", img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=150", id: "pecherie" },
            { name: "CRÈMERIE", img: "https://images.unsplash.com/photo-1501443762994-82bd5dabb892?w=150", id: "cremerie" },
            { name: "CAFÉTÉRIA", img: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=150", id: "cafeteria" }
        ];

        const allProducts = [
            { id: 1, name: "Mocassin Cuir", cat: "homme", price: 12500, desc: "Cuir véritable.", img: "https://images.unsplash.com/photo-1614252235316-8c857d38b5f4?w=400", options: [39,40,41,42], optionLabel: "Pointure", shop: { name: "Milano Bottier", city: "Tlemcen" } },
            { id: 2, name: "Plat Poisson Mélange", cat: "pecherie", price: 1200, desc: "Frais grillé.", img: "https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=400", shop: { name: "La Madrague", city: "Ghazaouet" } },
            { id: 3, name: "Glace Artisanale", cat: "cremerie", price: 850, desc: "Pot XL.", img: "https://images.unsplash.com/photo-1501443762994-82bd5dabb892?w=400", options: ["Vanille", "Choco"], optionLabel: "Parfum", shop: { name: "Gelato AURA", city: "Alger" } },
            { id: 4, name: "Montre Or 18K", cat: "bijoux", price: 45000, desc: "Luxe intemporel.", img: "https://images.unsplash.com/photo-1524333865941-2470636d813f?w=400", shop: { name: "Or d'Orient", city: "Tlemcen" } },
            { id: 5, name: "AirPods Pro", cat: "tech", price: 32000, desc: "Réduction de bruit.", img: "https://images.unsplash.com/photo-1588423770574-91021160dfdf?w=400", shop: { name: "AURA Tech", city: "Alger" } }
        ];

        let cart = JSON.parse(localStorage.getItem('aura_cart')) || [];
        let favorites = JSON.parse(localStorage.getItem('aura_favs')) || [];
        let selectedOption = null, currentQty = 1;

        // UI Helpers
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('sidebar-overlay').classList.toggle('hidden'); }
        function toggleCart() { document.getElementById('cart-panel').classList.toggle('translate-x-full'); document.getElementById('cart-overlay').classList.toggle('hidden'); updateCartUI(); }

        function addToCart(p, qty, opt) {
            cart.push({ ...p, qty, selectedOpt: opt });
            localStorage.setItem('aura_cart', JSON.stringify(cart));
            updateCartUI();
            closeModal();
            toggleCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('aura_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');
            list.innerHTML = "";
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price * item.qty;
                list.innerHTML += `<div class="flex gap-3 border-b pb-3 items-center">
                    <img src="${item.img}" class="w-12 h-12 rounded object-cover">
                    <div class="flex-1">
                        <h4 class="text-[10px] font-black uppercase">${item.name}</h4>
                        <p class="text-[9px] text-gray-500">${item.qty} x ${item.price} DA ${item.selectedOpt ? `(${item.selectedOpt})` : ''}</p>
                    </div>
                    <i class="fa-solid fa-trash text-red-500 cursor-pointer text-xs" onclick="removeFromCart(${index})"></i>
                </div>`;
            });

            totalEl.innerText = total + " DA";
            countEl.innerText = cart.length;
            cart.length > 0 ? countEl.classList.remove('hidden') : countEl.classList.add('hidden');
        }

        function checkoutWhatsApp() {
            if (cart.length === 0) return alert("Votre panier est vide !");
            let msg = "*NOUVELLE COMMANDE AURA*\n\n";
            let total = 0;
            cart.forEach(item => {
                msg += `📍 *${item.name}*\n   Qté: ${item.qty} | Prix: ${item.price*item.qty} DA ${item.selectedOpt ? `\n   Option: ${item.selectedOpt}` : ''}\n   Shop: ${item.shop.name}\n\n`;
                total += item.price * item.qty;
            });
            msg += `💰 *TOTAL GÉNÉRAL: ${total} DA*`;
            window.open(`https://wa.me/213541124032?text=${encodeURIComponent(msg)}`);
        }

        // Functions from v7.6 (Restored)
        function renderHome() {
            document.getElementById('back-nav').classList.add('hidden');
            document.getElementById('hero-banner').style.display = "block";
            document.getElementById('category-grid').style.display = "grid";
            const grid = document.getElementById('category-grid'); grid.innerHTML = "";
            mainCategories.forEach(cat => {
                grid.innerHTML += `<div class="flex flex-col items-center cursor-pointer" onclick="${cat.id === 'food' ? 'renderFoodHub()' : `renderCategory('${cat.id}')`}">
                    <div class="w-14 h-14 rounded-full border-2 border-aura-gold overflow-hidden bg-aura-blue"><img src="${cat.img}" class="mini-img"></div>
                    <span class="text-[8px] font-bold mt-2 uppercase text-center">${cat.name}</span>
                </div>`;
            });
            document.getElementById('hero-banner').innerHTML = `<div class="rounded-xl overflow-hidden relative h-32 bg-aura-blue border-b-2 border-aura-gold mt-2 shadow-lg"><div class="absolute inset-0 bg-gradient-to-r from-aura-blue p-4 flex flex-col justify-center z-10"><h3 class="text-aura-gold text-sm font-bold uppercase tracking-widest">AURA LUXURY</h3><p class="text-white text-[10px]">Tlemcen Premium Delivery</p></div><img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800" class="absolute right-0 w-full h-full object-cover opacity-30"></div>`;
            renderProducts(allProducts);
            updateCartUI();
        }

        function renderCategory(catId) {
            document.getElementById('back-nav').classList.remove('hidden');
            document.getElementById('hero-banner').style.display = "none";
            renderProducts(allProducts.filter(p => p.cat === catId));
        }

        function renderFoodHub() {
            document.getElementById('back-nav').classList.remove('hidden');
            document.getElementById('hero-banner').style.display = "none";
            const grid = document.getElementById('category-grid'); grid.innerHTML = "";
            foodCategories.forEach(cat => {
                grid.innerHTML += `<div class="flex flex-col items-center cursor-pointer" onclick="renderCategory('${cat.id}')">
                    <div class="w-14 h-14 rounded-full border-2 border-aura-gold overflow-hidden"><img src="${cat.img}" class="mini-img"></div>
                    <span class="text-[8px] font-bold mt-2 uppercase text-center">${cat.name}</span>
                </div>`;
            });
            renderProducts(allProducts.filter(p => ["pizzeria", "pecherie", "cremerie", "cafeteria"].includes(p.cat)));
        }

        function renderProducts(products) {
            const list = document.getElementById('product-list'); list.innerHTML = "";
            products.forEach(p => {
                const isFav = favorites.includes(p.id) ? 'is-favorite' : '';
                list.innerHTML += `<div class="bg-white rounded-xl p-3 shadow-md border-b-2 border-aura-gold relative">
                    <button onclick="toggleFavorite(${p.id}, event)" class="absolute top-4 right-4 z-10 bg-white/80 rounded-full w-7 h-7 flex items-center justify-center shadow"><i class="fa-solid fa-heart ${isFav} text-gray-300"></i></button>
                    <img src="${p.img}" class="w-full h-32 object-cover rounded-lg mb-2 cursor-pointer" onclick="openModal(${p.id})">
                    <h4 class="text-[11px] font-bold truncate uppercase">${p.name}</h4>
                    <p class="font-black text-xs text-aura-blue">${p.price} DA</p>
                    <p class="text-[9px] text-aura-gold font-bold mt-1 cursor-pointer underline" onclick="renderShop('${p.shop.name}')"><i class="fa-solid fa-store"></i> ${p.shop.name}</p>
                </div>`;
            });
        }

        function openModal(id) {
            const p = allProducts.find(x => x.id === id);
            selectedOption = null; currentQty = 1;
            let optionsHtml = p.options ? `<div class="mt-4"><p class="text-[10px] font-bold mb-2 uppercase">Choisir ${p.optionLabel} :</p><div class="flex flex-wrap gap-2">${p.options.map(o => `<button onclick="selectOpt(this, '${o}')" class="option-btn border border-gray-300 px-3 py-1 rounded text-[10px] font-bold uppercase">${o}</button>`).join('')}</div></div>` : '';
            document.getElementById('modal-content').innerHTML = `<img src="${p.img}" class="w-full h-64 object-cover">
                <div class="p-6">
                    <h2 class="text-xl font-bold uppercase">${p.name}</h2>
                    <p class="text-aura-gold font-bold text-2xl mt-1"><span id="total-price">${p.price}</span> DA</p>
                    <div class="flex items-center gap-4 mt-6 bg-gray-50 p-3 rounded-lg justify-between"><p class="text-xs font-bold uppercase">Quantité :</p><div class="flex items-center gap-4"><button onclick="updateQty(-1, ${p.price})" class="w-8 h-8 rounded-full border border-aura-blue font-bold">-</button><span id="qty-display" class="font-bold text-lg">1</span><button onclick="updateQty(1, ${p.price})" class="w-8 h-8 rounded-full bg-aura-blue text-white font-bold">+</button></div></div>
                    ${optionsHtml}
                    <button onclick="addToCart(${JSON.stringify(p).replace(/"/g, '&quot;')}, currentQty, selectedOption)" class="w-full bg-aura-blue text-aura-gold py-4 rounded-xl font-bold mt-6 shadow-xl uppercase text-xs flex items-center justify-center gap-2"><i class="fa-solid fa-cart-plus text-lg"></i> Ajouter au panier</button>
                </div>`;
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function updateQty(v, u) { currentQty = Math.max(1, currentQty + v); document.getElementById('qty-display').innerText = currentQty; document.getElementById('total-price').innerText = currentQty * u; }
        function selectOpt(b, o) { document.querySelectorAll('.option-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); selectedOption = o; }
        function closeModal() { document.getElementById('product-modal').classList.add('hidden'); }
        function toggleFavorite(id, e) { e.stopPropagation(); favorites = favorites.includes(id) ? favorites.filter(f => f !== id) : [...favorites, id]; localStorage.setItem('aura_favs', JSON.stringify(favorites)); renderProducts(allProducts); }
        function handleSearch() { /* Logic same as v7.6 */ }

        renderHome();
    </script>
</body>
</html>
