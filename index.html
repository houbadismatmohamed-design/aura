<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA Marketplace - Officiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-aura-blue { background-color: #0A192F; }
        .text-aura-gold { color: #D4AF37; }
        .border-aura-gold { border-color: #D4AF37; }
        #sidebar, #cart-panel { transition: transform 0.3s ease-in-out; }
        .is-favorite { color: #ff4d4d !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-aura-blue overflow-x-hidden">

    <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-[70]" onclick="toggleSidebar()"></div>
    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-aura-blue z-[80] transform -translate-x-full shadow-2xl p-6">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-aura-gold text-2xl font-black tracking-widest">AURA</h2>
            <i class="fa-solid fa-xmark text-aura-gold text-xl cursor-pointer" onclick="toggleSidebar()"></i>
        </div>
        <nav class="flex flex-col gap-6 text-white font-bold uppercase text-xs">
            <a href="#" onclick="location.reload()" class="hover:text-aura-gold"><i class="fa-solid fa-house mr-3"></i> Accueil</a>
            <a href="vendeur.html" class="hover:text-aura-gold"><i class="fa-solid fa-store mr-3"></i> Espace Vendeur</a>
        </nav>
    </div>

    <header class="bg-aura-blue text-aura-gold p-4 sticky top-0 z-50 shadow-2xl">
        <div class="flex justify-between items-center max-w-6xl mx-auto">
            <i class="fa-solid fa-bars-staggered text-xl cursor-pointer" onclick="toggleSidebar()"></i>
            <h1 class="text-3xl font-bold tracking-widest cursor-pointer" onclick="location.reload()">AURA</h1>
            <div class="relative cursor-pointer" onclick="toggleCart()">
                <i class="fa-solid fa-cart-shopping text-xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold hidden">0</span>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <div id="back-nav" class="hidden mb-4 cursor-pointer font-bold text-xs" onclick="filterByCategory(null)">
            <i class="fa-solid fa-arrow-left mr-2"></i> RETOUR À L'ACCUEIL
        </div>

        <div id="category-grid" class="grid grid-cols-4 gap-4 py-4 text-center">
            </div>
        
        <div id="hero-banner" class="rounded-2xl overflow-hidden relative h-36 bg-aura-blue border-b-4 border-aura-gold shadow-lg mb-8">
            <div class="absolute inset-0 bg-gradient-to-r from-aura-blue p-6 flex flex-col justify-center z-10">
                <h3 class="text-aura-gold text-lg font-black uppercase tracking-tighter">AURA LUXURY</h3>
                <p class="text-white text-[10px] opacity-80 uppercase tracking-widest">Le Marketplace Nouvelle Génération</p>
            </div>
            <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800" class="absolute right-0 w-full h-full object-cover opacity-40">
        </div>

        <div class="flex justify-between items-center mb-6">
            <h2 id="section-title" class="text-xs font-black uppercase text-gray-400 tracking-[0.2em]">Nouveautés Live</h2>
            <div class="flex gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-[9px] font-bold text-green-600">DÉPÔT EN DIRECT</span>
            </div>
        </div>

        <div id="product-list" class="grid grid-cols-2 gap-4 md:grid-cols-4">
            </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }
        function toggleCart() { alert("Le panier sera activé dans la prochaine mise à jour !"); }
    </script>

    <script type="module" src="script.js"></script>
</body>
</html>
