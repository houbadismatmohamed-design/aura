<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA Marketplace - Officiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .bg-aura-blue { background-color: #0A192F; }
        .text-aura-gold { color: #D4AF37; }
        .border-aura-gold { border-color: #D4AF37; }
        .mini-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        #sidebar { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-aura-blue overflow-x-hidden">

    <div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-[70]" onclick="toggleSidebar()"></div>
    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-aura-blue z-[80] transform -translate-x-full shadow-2xl p-6">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-aura-gold text-2xl font-black tracking-widest">AURA</h2>
            <i class="fa-solid fa-xmark text-aura-gold text-xl cursor-pointer" onclick="toggleSidebar()"></i>
        </div>
        <nav class="flex flex-col gap-6 text-white font-bold uppercase text-sm">
            <a href="#" onclick="location.reload()" class="hover:text-aura-gold"><i class="fa-solid fa-house mr-3"></i> Accueil</a>
            <div class="h-[1px] bg-white/10 my-2"></div>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest">Marketplace DZ</p>
        </nav>
    </div>

    <header class="bg-aura-blue text-aura-gold p-4 sticky top-0 z-50 shadow-2xl">
        <div class="flex justify-between items-center max-w-6xl mx-auto">
            <i class="fa-solid fa-bars-staggered text-xl cursor-pointer" onclick="toggleSidebar()"></i>
            <h1 class="text-3xl font-bold tracking-widest cursor-pointer" onclick="location.reload()">AURA</h1>
            <div class="relative">
                <i class="fa-solid fa-cart-shopping text-xl"></i>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <div id="category-grid" class="grid grid-cols-4 gap-4 py-4 text-center"></div>
        
        <div id="hero-banner" class="rounded-xl overflow-hidden relative h-32 bg-aura-blue border-b-2 border-aura-gold mt-2 shadow-lg">
            <div class="absolute inset-0 bg-gradient-to-r from-aura-blue p-4 flex flex-col justify-center z-10">
                <h3 class="text-aura-gold text-sm font-bold uppercase tracking-widest">AURA Connect</h3>
                <p class="text-white text-[10px]">Tes produits Firebase en direct</p>
            </div>
            <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=800" class="absolute right-0 w-full h-full object-cover opacity-30">
        </div>

        <div class="flex justify-between items-center mt-8 mb-4">
            <h2 class="text-xs font-black uppercase text-gray-400 tracking-widest">Nouveautés</h2>
            <span class="text-[9px] font-bold text-green-600 bg-green-50 px-2 py-1 rounded-full animate-pulse">LIVE</span>
        </div>
        
        <div id="product-list" class="grid grid-cols-2 gap-4">
            </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }
    </script>

    <script type="module" src="script.js"></script>

</body>
</html>
